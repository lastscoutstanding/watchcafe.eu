<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flip Clock</title>

<style>
body {
  margin: 0;
  background: #0f0f10;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: 'Segoe UI', sans-serif;
}

/* Clock container */
.clock {
  display: flex;
  gap: 12px;
}

/* Each digit box */
.flip {
  position: relative;
  width: 70px;
  height: 100px;
  background: #1b1b1d;
  border-radius: 10px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.6),
              inset 0 2px 2px rgba(255,255,255,0.05);
  color: #f5f5f5;
  font-size: 3rem;
  font-weight: bold;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Colon */
.colon {
  font-size: 3rem;
  color: #888;
  display: flex;
  align-items: center;
}

/* Flip animation */
.flip.animate {
  animation: flip 0.6s ease;
}

@keyframes flip {
  0%   { transform: rotateX(0deg); }
  50%  { transform: rotateX(-90deg); }
  100% { transform: rotateX(0deg); }
}
</style>
</head>

<body>

<div class="clock">
  <div class="flip" id="h1">0</div>
  <div class="flip" id="h2">0</div>
  <div class="colon">:</div>
  <div class="flip" id="m1">0</div>
  <div class="flip" id="m2">0</div>
  <div class="colon">:</div>
  <div class="flip" id="s1">0</div>
  <div class="flip" id="s2">0</div>
</div>

<script>
function updateClock() {
  const now = new Date();

  const time = [
    String(now.getHours()).padStart(2, '0'),
    String(now.getMinutes()).padStart(2, '0'),
    String(now.getSeconds()).padStart(2, '0')
  ];

  const digits = (time[0] + time[1] + time[2]).split('');

  const ids = ["h1","h2","m1","m2","s1","s2"];

  digits.forEach((digit, i) => {
    const el = document.getElementById(ids[i]);
    if (el.textContent !== digit) {
      el.textContent = digit;
      el.classList.remove("animate");
      void el.offsetWidth; // restart animation
      el.classList.add("animate");
    }
  });
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
