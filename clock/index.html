<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sioux Watch Café Clock</title>

  <style>
    :root {
      --bg: #edeae6;
      --card: #f7f5f2;
      --accent: #c46a45;
      --text: #333333;

      --led-on: #ff2b2b;
      --led-glow: rgba(255, 43, 43, 0.65);
      --led-off: #3a0b0b;
      --clock-bg: #151515;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .header {
      text-align: center;
      padding: 50px 20px 30px;
    }

    .header h1 {
      color: var(--accent);
      font-size: 36px;
      margin: 0 0 10px;
    }

    .header p {
      color: #555;
      font-size: 16px;
      margin: 0;
    }

    .divider {
      height: 4px;
      background: var(--accent);
      margin: 20px 0;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px;
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 36px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
    }

    h2 {
      color: var(--accent);
      margin: 0 0 18px;
      font-size: 22px;
    }

    .clock-panel {
      background: linear-gradient(180deg, #1d1d1d 0%, #111 100%);
      border-radius: 18px;
      padding: 28px 20px 22px;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: auto;
      box-shadow:
        inset 0 2px 4px rgba(255,255,255,0.04),
        inset 0 -4px 10px rgba(0,0,0,0.45),
        0 8px 18px rgba(0,0,0,0.18);
    }

    .clock {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: max-content;
    }

    /* ===== Main time digits ===== */
    .digit {
      position: relative;
      width: 64px;
      height: 116px;
      background: rgba(255,255,255,0.02);
      border-radius: 10px;
    }

    .segment {
      position: absolute;
      background: var(--led-off);
      box-shadow: none;
      transition: background 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
      opacity: 0.28;
    }

    .segment.on {
      background: var(--led-on);
      opacity: 1;
      box-shadow:
        0 0 6px var(--led-glow),
        0 0 12px var(--led-glow),
        0 0 24px rgba(255, 43, 43, 0.32);
    }

    .a, .d, .g {
      width: 38px;
      height: 10px;
      left: 13px;
      clip-path: polygon(10% 0, 90% 0, 100% 50%, 90% 100%, 10% 100%, 0 50%);
    }

    .a { top: 6px; }
    .g { top: 53px; }
    .d { bottom: 6px; }

    .b, .c, .e, .f {
      width: 10px;
      height: 42px;
      clip-path: polygon(0 10%, 50% 0, 100% 10%, 100% 90%, 50% 100%, 0 90%);
    }

    .f { left: 6px; top: 12px; }
    .b { right: 6px; top: 12px; }
    .e { left: 6px; bottom: 12px; }
    .c { right: 6px; bottom: 12px; }

    .colon {
      width: 18px;
      height: 116px;
      position: relative;
      margin: 0 2px;
    }

    .colon::before,
    .colon::after {
      content: "";
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--led-on);
      box-shadow:
        0 0 6px var(--led-glow),
        0 0 12px var(--led-glow),
        0 0 20px rgba(255, 43, 43, 0.3);
    }

    .colon::before {
      top: 34px;
    }

    .colon::after {
      bottom: 34px;
    }

    /* ===== Smaller date display ===== */
    .date-led {
      margin-top: 16px;
      padding: 10px 18px;
      min-width: 320px;
      text-align: center;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      color: var(--led-on);
      font-family: "Consolas", "Courier New", monospace;
      font-size: 1.15rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      box-shadow:
        inset 0 1px 2px rgba(255,255,255,0.03),
        0 0 8px rgba(255, 43, 43, 0.10);
      text-shadow:
        0 0 4px rgba(255, 43, 43, 0.65),
        0 0 10px rgba(255, 43, 43, 0.18);
      opacity: 0.95;
    }

    .clock-caption {
      text-align: center;
      margin-top: 14px;
      color: #666;
      font-size: 14px;
    }

    .next {
      margin-top: 24px;
      background: #d89a78;
      color: #fff;
      padding: 16px 20px;
      border-radius: 8px;
      font-weight: 600;
    }

    @media (max-width: 768px) {
      .header h1 {
        font-size: 30px;
      }

      .card {
        padding: 24px;
      }

      .digit {
        width: 48px;
        height: 88px;
      }

      .a, .d, .g {
        width: 28px;
        height: 8px;
        left: 10px;
      }

      .a { top: 5px; }
      .g { top: 40px; }
      .d { bottom: 5px; }

      .b, .c, .e, .f {
        width: 8px;
        height: 30px;
      }

      .f { left: 5px; top: 10px; }
      .b { right: 5px; top: 10px; }
      .e { left: 5px; bottom: 10px; }
      .c { right: 5px; bottom: 10px; }

      .colon {
        height: 88px;
      }

      .colon::before {
        top: 24px;
      }

      .colon::after {
        bottom: 24px;
      }

      .colon::before,
      .colon::after {
        width: 8px;
        height: 8px;
      }

      .date-led {
        min-width: 240px;
        font-size: 0.85rem;
        letter-spacing: 0.08em;
        padding: 8px 12px;
      }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>The Sioux Watch Café</h1>
    <p>A relaxed gathering for Sioux colleagues who like watches.</p>
  </div>

  <div class="divider"></div>

  <div class="container">
    <div class="card">
      <h2>Live Clock</h2>

      <div class="clock-panel">
        <div class="clock">
          <div class="digit" id="digit0">
            <div class="segment a"></div>
            <div class="segment b"></div>
            <div class="segment c"></div>
            <div class="segment d"></div>
            <div class="segment e"></div>
            <div class="segment f"></div>
            <div class="segment g"></div>
          </div>

          <div class="digit" id="digit1">
            <div class="segment a"></div>
            <div class="segment b"></div>
            <div class="segment c"></div>
            <div class="segment d"></div>
            <div class="segment e"></div>
            <div class="segment f"></div>
            <div class="segment g"></div>
          </div>

          <div class="colon"></div>

          <div class="digit" id="digit2">
            <div class="segment a"></div>
            <div class="segment b"></div>
            <div class="segment c"></div>
            <div class="segment d"></div>
            <div class="segment e"></div>
            <div class="segment f"></div>
            <div class="segment g"></div>
          </div>

          <div class="digit" id="digit3">
            <div class="segment a"></div>
            <div class="segment b"></div>
            <div class="segment c"></div>
            <div class="segment d"></div>
            <div class="segment e"></div>
            <div class="segment f"></div>
            <div class="segment g"></div>
          </div>

          <div class="colon"></div>

          <div class="digit" id="digit4">
            <div class="segment a"></div>
            <div class="segment b"></div>
            <div class="segment c"></div>
            <div class="segment d"></div>
            <div class="segment e"></div>
            <div class="segment f"></div>
            <div class="segment g"></div>
          </div>

          <div class="digit" id="digit5">
            <div class="segment a"></div>
            <div class="segment b"></div>
            <div class="segment c"></div>
            <div class="segment d"></div>
            <div class="segment e"></div>
            <div class="segment f"></div>
            <div class="segment g"></div>
          </div>
        </div>

        <div class="date-led" id="dateDisplay">MON 01 JAN 2026</div>
      </div>

      <div class="clock-caption">
        Europe/Amsterdam time
      </div>

      <div class="next">
        Next meeting: May 22nd, 2026 @ Labs during the Vrijmibo
      </div>
    </div>
  </div>

  <script>
    const digitMap = {
      "0": ["a", "b", "c", "d", "e", "f"],
      "1": ["b", "c"],
      "2": ["a", "b", "d", "e", "g"],
      "3": ["a", "b", "c", "d", "g"],
      "4": ["b", "c", "f", "g"],
      "5": ["a", "c", "d", "f", "g"],
      "6": ["a", "c", "d", "e", "f", "g"],
      "7": ["a", "b", "c"],
      "8": ["a", "b", "c", "d", "e", "f", "g"],
      "9": ["a", "b", "c", "d", "f", "g"]
    };

    function setDigit(elementId, numberChar) {
      const digit = document.getElementById(elementId);
      const segments = digit.querySelectorAll(".segment");
      const activeSegments = digitMap[numberChar] || [];

      segments.forEach(segment => {
        const segmentClass = [...segment.classList].find(cls =>
          ["a", "b", "c", "d", "e", "f", "g"].includes(cls)
        );

        if (activeSegments.includes(segmentClass)) {
          segment.classList.add("on");
        } else {
          segment.classList.remove("on");
        }
      });
    }

    function updateClock() {
      const now = new Date(
        new Date().toLocaleString("en-US", { timeZone: "Europe/Amsterdam" })
      );

      const hh = String(now.getHours()).padStart(2, "0");
      const mm = String(now.getMinutes()).padStart(2, "0");
      const ss = String(now.getSeconds()).padStart(2, "0");

      const allDigits = (hh + mm + ss).split("");

      allDigits.forEach((digit, index) => {
        setDigit("digit" + index, digit);
      });

      const dateText = now.toLocaleDateString("en-GB", {
        timeZone: "Europe/Amsterdam",
        weekday: "short",
        day: "2-digit",
        month: "short",
        year: "numeric"
      }).replace(/,/g, "").toUpperCase();

      document.getElementById("dateDisplay").textContent = dateText;
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>

</body>
</html>
